# pyproject.toml
[project]
name = "finaro-ap-automation"
version = "1.0.0"
description = "AP Automation Core Engine - 3-Way Matching Engine for FinaRo"
requires-python = ">=3.11"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
python_files = ["test_*.py"]
python_functions = ["test_*"]

[tool.black]
line-length = 100
target-version = ['py311']

[tool.isort]
profile = "black"
line_length = 100
