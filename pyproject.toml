# pyproject.toml
[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "finaro-ap-automation"
version = "1.0.0"
description = "AP Automation Core Engine - 3-Way Matching Engine"
authors = [{name = "FinaRo", email = "dev@finaro.com"}]
requires-python = ">=3.11"
license = {text = "MIT"}
readme = "README.md"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"

[tool.black]
line-length = 100
target-version = ['py311']

[tool.isort]
profile = "black"
line_length = 100
