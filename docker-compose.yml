# docker-compose.yml
version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ap-automation-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://apuser:appass@pgbouncer:5432/apautomation
      - DATABASE_HOST=pgbouncer
      - DATABASE_PORT=5432
      - DATABASE_NAME=apautomation
      - DATABASE_USER=apuser
      - DATABASE_PASSWORD=appass
      - PGBOUNCER_HOST=pgbouncer
      - PGBOUNCER_PORT=5433
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-supersecretkey-change-in-production}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - THRESHOLD_HIGH=0.95
      - THRESHOLD_MID=0.75
      - THRESHOLD_LOW=0.50
      - TOLERANCE_PRICE=0.02
      - TOLERANCE_QTY=0.05
      - LOG_LEVEL=INFO
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ap-network

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: ap-pgbouncer
    ports:
      - "5433:5432"
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_NAME=apautomation
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=100
      - DEFAULT_POOL_SIZE=20
      - RESERVE_POOL_SIZE=5
      - RESERVE_POOL_TIMEOUT=5
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgbouncer -V"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ap-network

  postgres:
    image: postgres:15-alpine
    container_name: ap-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=apautomation
      - POSTGRES_USER=apuser
      - POSTGRES_PASSWORD=appass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apuser -d apautomation"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ap-network

  alembic-migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ap-alembic-migrate
    command: ["alembic", "upgrade", "head"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://apuser:appass@pgbouncer:5432/apautomation
    depends_on:
      pgbouncer:
        condition: service_healthy
    networks:
      - ap-network

volumes:
  postgres_data:

networks:
  ap-network:
    driver: bridge
