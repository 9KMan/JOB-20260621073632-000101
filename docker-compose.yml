# Local development stack for AP Automation Core Engine.
# Brings up Postgres, an optional PGBouncer sidecar, and the API.

services:
  db:
    image: postgres:15-alpine
    container_name: ap_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ap_automation}
      POSTGRES_USER: ${POSTGRES_USER:-ap_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ap_password}
    ports:
      - "5432:5432"
    volumes:
      - ap_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ap_user} -d ${POSTGRES_DB:-ap_automation}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: bitnami/pgbouncer:1.22.1
    container_name: ap_pgbouncer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGBOUNCER_DATABASE: ${POSTGRES_DB:-ap_automation}
      PGBOUNCER_USERNAME: ${POSTGRES_USER:-ap_user}
      PGBOUNCER_PASSWORD: ${POSTGRES_PASSWORD:-ap_password}
      PGBOUNCER_AUTH_TYPE: scram-sha-256
      PGBOUNCER_AUTH_FILE: /etc/pgbouncer/userlist.txt
      PGBOUNCER_LISTEN_ADDR: 0.0.0.0
      PGBOUNCER_LISTEN_PORT: 6432
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_DEFAULT_POOL_SIZE: 20
    ports:
      - "6432:6432"
    volumes:
      - ./docker/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./docker/userlist.txt:/etc/pgbouncer/userlist.txt:ro

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ap_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ap_user}:${POSTGRES_PASSWORD:-ap_password}@pgbouncer:6432/${POSTGRES_DB:-ap_automation}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-ap_user}:${POSTGRES_PASSWORD:-ap_password}@db:5432/${POSTGRES_DB:-ap_automation}
    ports:
      - "8000:8000"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

volumes:
  ap_pgdata:
    driver: local
