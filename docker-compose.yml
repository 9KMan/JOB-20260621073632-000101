# docker-compose.yml
version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ap-automation-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-apuser}:${POSTGRES_PASSWORD:-appass}@db:5432/${POSTGRES_DB:-apautomation}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=HS256
      - THRESHOLD_HIGH=${THRESHOLD_HIGH:-0.95}
      - THRESHOLD_MID=${THRESHOLD_MID:-0.75}
      - THRESHOLD_LOW=${THRESHOLD_LOW:-0.50}
      - TOLERANCE_PRICE=${TOLERANCE_PRICE:-5.0}
      - TOLERANCE_QTY=${TOLERANCE_QTY:-10.0}
    depends_on:
      db:
        condition: service_healthy
      pgBouncer:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro
    networks:
      - ap-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:15-alpine
    container_name: ap-automation-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-apuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-appass}
      - POSTGRES_DB=${POSTGRES_DB:-apautomation}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ap-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apuser} -d ${POSTGRES_DB:-apautomation}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  pgBouncer:
    image: edoburu/pgbouncer:latest
    container_name: ap-automation-pgbouncer
    environment:
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_NAME=${POSTGRES_DB:-apautomation}
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=100
      - DEFAULT_POOL_SIZE=20
    ports:
      - "${PGBOUNCER_PORT:-6432}:5432"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ap-network
    healthcheck:
      test: ["CMD-SHELL", "pgbouncer -c show pools | grep -q apautomation"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  ap-network:
    driver: bridge
