# docker-compose.yml
version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://finaro:finaro123@db:5432/finaro
      - SECRET_KEY=${SECRET_KEY:-supersecretkey123456789012345678901234567890}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    command: >
      sh -c "alembic upgrade head && uvicorn src.app.main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - finaro-network

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=finaro
      - POSTGRES_PASSWORD=finaro123
      - POSTGRES_DB=finaro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finaro -d finaro"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finaro-network

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@finaro.com
      - PGADMIN_DEFAULT_PASSWORD=admin123
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - finaro-network

volumes:
  postgres_data:

networks:
  finaro-network:
    driver: bridge
