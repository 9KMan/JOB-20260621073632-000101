// docker-compose.yml
version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finaro-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://finaro_user:finaro_secure_password@db:5432/finaro_db
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - finaro-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:16-alpine
    container_name: finaro-db
    environment:
      - POSTGRES_USER=finaro_user
      - POSTGRES_PASSWORD=finaro_secure_password
      - POSTGRES_DB=finaro_db
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=en_US.utf8
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - finaro-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finaro_user -d finaro_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbo ancer:
    image: edoburu/pgbouncer:latest
    container_name: finaro-pgbouncer
    environment:
      - DATABASE_URL=postgresql://finaro_user:finaro_secure_password@db:5432/finaro_db
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=100
      - DEFAULT_POOL_SIZE=20
      - MIN_POOL_SIZE=5
      - SERVER_RESET_ON_RELEASE=true
      - SERVER_LIFETIME=3600
      - SERVER_IDLE_TIMEOUT=600
    ports:
      - "5433:5432"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - finaro-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U finaro_user -d finaro_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrations:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finaro-migrations
    command: alembic upgrade head
    environment:
      - DATABASE_URL=postgresql://finaro_user:finaro_secure_password@db:5432/finaro_db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - finaro-network
    restart: "no"

volumes:
  postgres_data:
    driver: local

networks:
  finaro-network:
    driver: bridge
