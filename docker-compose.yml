# docker-compose.yml
version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finaro-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://finaro:password@postgres:5432/finaro_ap
      - SECRET_KEY=dev-secret-key-change-in-production-32chars
      - DEBUG=true
      - LOG_LEVEL=INFO
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - finaro-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: finaro-postgres
    environment:
      - POSTGRES_USER=finaro
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=finaro_ap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finaro -d finaro_ap"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - finaro-network
    restart: unless-stopped

  alembic:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finaro-alembic
    command: alembic upgrade head
    environment:
      - DATABASE_URL=postgresql://finaro:password@postgres:5432/finaro_ap
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - finaro-network

networks:
  finaro-network:
    driver: bridge

volumes:
  postgres_data:
