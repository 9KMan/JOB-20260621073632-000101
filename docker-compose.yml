# docker-compose.yml
version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: ap_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-appass}
      POSTGRES_DB: ${POSTGRES_DB:-apautomation}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apuser} -d ${POSTGRES_DB:-apautomation}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: ap_pgbouncer
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-apuser}:${POSTGRES_PASSWORD:-appass}@postgres:5432/${POSTGRES_DB:-apautomation}"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 20
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ap_api
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-apuser}:${POSTGRES_PASSWORD:-appass}@pgbouncer:5432/${POSTGRES_DB:-apautomation}"
      PGBOUNCER_HOST: pgbouncer
      PGBOUNCER_PORT: 5432
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-changeme-in-production}
      JWT_ALGORITHM: HS256
      THRESHOLD_HIGH: ${THRESHOLD_HIGH:-0.95}
      THRESHOLD_MID: ${THRESHOLD_MID:-0.80}
      THRESHOLD_LOW: ${THRESHOLD_LOW:-0.60}
      TOLERANCE_PRICE: ${TOLERANCE_PRICE:-0.02}
      TOLERANCE_QTY: ${TOLERANCE_QTY:-0.10}
    ports:
      - "8000:8000"
    depends_on:
      pgbouncer:
        condition: service_started
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
