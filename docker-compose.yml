// docker-compose.yml
version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://finaro:secure_password@postgres:5432/finaro_ap
      - DATABASE_URL_SYNC=postgresql://finaro:secure_password@postgres:5432/finaro_ap
      - SECRET_KEY=dev-secret-key-change-in-production-32chars
      - APP_ENV=development
      - DEBUG=true
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    command: >
      sh -c "alembic upgrade head && uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload"

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=finaro
      - POSTGRES_PASSWORD=secure_password
      - POSTGRES_DB=finaro_ap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finaro -d finaro_ap"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
