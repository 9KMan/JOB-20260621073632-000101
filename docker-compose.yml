// docker-compose.yml
version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finaro-ap-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/finaro_ap
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
      - JWT_ALGORITHM=HS256
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=30
      - DEBUG=true
      - LOG_LEVEL=INFO
      - MATCHING_WEIGHT_LINE_LEVEL=70
      - MATCHING_WEIGHT_AMOUNT=20
      - MATCHING_WEIGHT_DATE=10
      - AUTO_APPROVE_THRESHOLD=95
      - HUMAN_REVIEW_THRESHOLD=70
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
      "
    networks:
      - finaro-network

  db:
    image: postgres:16-alpine
    container_name: finaro-ap-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=finaro_ap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finaro_ap"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - finaro-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: finaro-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@finaro.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - finaro-network

networks:
  finaro-network:
    driver: bridge

volumes:
  postgres_data:
