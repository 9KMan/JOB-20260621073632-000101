# docker-compose.yml
version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ap-automation-api
    environment:
      - DATABASE_URL=postgresql+asyncpg://finaro:changeme@postgres:5432/ap_automation
      - PGBOUNCER_HOST=pgbouncer
      - PGBOUNCER_PORT=5432
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-supersecretkey-change-in-production}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_MINUTES=30
      - THRESHOLD_HIGH=95
      - THRESHOLD_MID=70
      - THRESHOLD_LOW=40
      - TOLERANCE_PRICE=5.0
      - TOLERANCE_QTY=10.0
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8080
      - LOG_LEVEL=INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - ap-network

  postgres:
    image: postgres:15-alpine
    container_name: ap-automation-postgres
    environment:
      - POSTGRES_USER=finaro
      - POSTGRES_PASSWORD=changeme
      - POSTGRES_DB=ap_automation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finaro -d ap_automation"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ap-network

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: ap-automation-pgbouncer
    environment:
      - DATABASE_URL=postgresql://finaro:changeme@postgres:5432/ap_automation
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=100
      - DEFAULT_POOL_SIZE=20
      - MIN_POOL_SIZE=5
      - RESERVE_POOL_SIZE=5
      - RESERVE_POOL_TIMEOUT=5
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "echo -e '\\x \\n' | nc localhost 6432 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ap-network

  alembic-migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ap-automation-migrations
    environment:
      - DATABASE_URL=postgresql+asyncpg://finaro:changeme@postgres:5432/ap_automation
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-supersecretkey-change-in-production}
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ap-network

volumes:
  postgres_data:
    driver: local

networks:
  ap-network:
    driver: bridge
