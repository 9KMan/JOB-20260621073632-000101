# docker-compose.yml
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ap-automation-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://apuser:appass@pgbouncer:5432/apautomation}
      - DATABASE_POOL_SIZE=${DATABASE_POOL_SIZE:-20}
      - DATABASE_MAX_OVERFLOW=${DATABASE_MAX_OVERFLOW:-10}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - THRESHOLD_HIGH=${THRESHOLD_HIGH:-95}
      - THRESHOLD_MID=${THRESHOLD_MID:-75}
      - THRESHOLD_LOW=${THRESHOLD_LOW:-50}
      - TOLERANCE_PRICE=${TOLERANCE_PRICE:-0.02}
      - TOLERANCE_QTY=${TOLERANCE_QTY:-0.05}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - ap-network

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: ap-automation-pgbouncer
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/apautomation}
      - POOL_MODE=${POOL_MODE:-transaction}
      - MAX_CLIENT_CONN=${MAX_CLIENT_CONN:-200}
      - DEFAULT_POOL_SIZE=${PGBOUNCER_POOL_SIZE:-20}
      - MIN_POOL_SIZE=${PGBOUNCER_MIN_POOL_SIZE:-5}
      - SERVER_RESET_ON_RETURN=${SERVER_RESET_ON_RETURN:-rollback}
      - SERVER_LIFETIME=${SERVER_LIFETIME:-3600}
      - SERVER_IDLE_TIMEOUT=${SERVER_IDLE_TIMEOUT:-600}
      - PGBOUNCER_USER=${PGBOUNCER_USER:-pgbouncer}
      - PGBOUNCER_PASSWORD=${PGBOUNCER_PASSWORD:-pgbouncerpass}
    ports:
      - "${PGBOUNCER_PORT:-6432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pgbouncer -V"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - ap-network

  postgres:
    image: postgres:15-alpine
    container_name: ap-automation-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-apautomation}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-apautomation}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ap-network

  redis:
    image: redis:7-alpine
    container_name: ap-automation-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ap-network

volumes:
  postgres_data:
  redis_data:

networks:
  ap-network:
    driver: bridge
