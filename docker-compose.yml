// docker-compose.yml
version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: ap-postgres
    environment:
      POSTGRES_DB: apautomation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d apautomation"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ap-network

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: ap-pgbouncer
    environment:
      DATABASE_URL: "postgres://postgres:changeme@postgres:5432/apautomation"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "100"
      DEFAULT_POOL_SIZE: "10"
      RESERVE_POOL_SIZE: "5"
      RESERVE_POOL_TIMEOUT: "3"
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ap-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ap-api
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:changeme@postgres:5432/apautomation
      - PGBOUNCER_HOST=pgbouncer
      - PGBOUNCER_PORT=5432
      - JWT_SECRET_KEY=change-me-in-production-use-strong-secret
      - JWT_ALGORITHM=HS256
      - THRESHOLD_HIGH=95.0
      - THRESHOLD_MID=70.0
      - THRESHOLD_LOW=40.0
      - TOLERANCE_PRICE=5.0
      - TOLERANCE_QTY=10.0
      - LOG_LEVEL=INFO
      - ENVIRONMENT=development
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    networks:
      - ap-network

  alembic-migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ap-alembic
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:changeme@postgres:5432/apautomation
      - PGBOUNCER_HOST=postgres
      - PGBOUNCER_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head
    networks:
      - ap-network

volumes:
  postgres_data:

networks:
  ap-network:
    driver: bridge
