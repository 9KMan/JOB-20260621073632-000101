# docker-compose.yml
version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://finaro:changeme@postgres:5432/finaro_ap
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - JWT_ALGORITHM=HS256
      - THRESHOLD_HIGH=95
      - THRESHOLD_MID=70
      - THRESHOLD_LOW=40
      - TOLERANCE_PRICE=0.05
      - TOLERANCE_QTY=0.10
      - LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=finaro
      - POSTGRES_PASSWORD=changeme
      - POSTGRES_DB=finaro_ap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finaro -d finaro_ap"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgBouncer:
    image: edoburu/pgbouncer:latest
    environment:
      - DATABASE_URL=postgresql://finaro:changeme@postgres:5432/finaro_ap
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=100
      - DEFAULT_POOL_SIZE=20
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgb杀cur", "-h", "localhost", "-p", "5432", "-U", "finaro", "-d", "finaro_ap"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
