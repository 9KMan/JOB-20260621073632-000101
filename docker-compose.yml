# docker-compose.yml
version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ap-automation-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://appuser:apppassword@postgres:5432/apautomation
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
      - JWT_ALGORITHM=HS256
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=30
      - THRESHOLD_HIGH=0.95
      - THRESHOLD_MID=0.75
      - THRESHOLD_LOW=0.50
      - TOLERANCE_PRICE=0.05
      - TOLERANCE_QTY=0.10
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    networks:
      - ap-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    container_name: ap-automation-postgres
    environment:
      - POSTGRES_USER=appuser
      - POSTGRES_PASSWORD=apppassword
      - POSTGRES_DB=apautomation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - ap-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d apautomation"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbo:
    image: edoburu/pgbouncer:latest
    container_name: ap-automation-pgbouncer
    environment:
      - DATABASE_URL=postgresql://appuser:apppassword@postgres:5432/apautomation
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=100
      - DEFAULT_POOL_SIZE=20
      - MIN_POOL_SIZE=5
      - RESERVE_POOL_SIZE=10
      - RESERVE_POOL_TIMEOUT=5
      - LOG_HISTORY=1024
      - SERVER_RESET_QUERY=DISCARD ALL
      - SERVER_CHECK_DELAY=30
      - SERVER_CHECK_QUERY=SELECT 1
      - SERVER_LIFETIME=3600
      - SERVER_IDLE_TIMEOUT=600
    ports:
      - "6432:5432"
    networks:
      - ap-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ap-automation-migrate
    command: alembic upgrade head
    environment:
      - DATABASE_URL=postgresql+asyncpg://appuser:apppassword@postgres:5432/apautomation
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ap-network
    restart: "no"

networks:
  ap-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
