# docker-compose.yml
version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ap-automation-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/apautomation
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-supersecretkey-change-in-production}
      - JWT_ALGORITHM=HS256
      - THRESHOLD_HIGH=95
      - THRESHOLD_MID=75
      - THRESHOLD_LOW=50
      - TOLERANCE_PRICE=5
      - TOLERANCE_QTY=10
      - LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: ap-automation-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=apautomation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgpouncer:
    image: edoburu/pgbouncer:latest
    container_name: ap-automation-pgbouncer
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/apautomation
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=100
      - DEFAULT_POOL_SIZE=20
      - MIN_POOL_SIZE=5
      - SERVER_IDLE_TIMEOUT=600
    ports:
      - "5433:5432"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  alembic:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ap-automation-alembic
    command: alembic upgrade head
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/apautomation
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
