// docker-compose.yml
version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finaro-app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/finaro
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DEBUG=false
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    networks:
      - finaro-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: finaro-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=finaro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finaro"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finaro-network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: finaro-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@finaro.io
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - finaro-network
    restart: unless-stopped
    profiles:
      - tools

networks:
  finaro-network:
    driver: bridge

volumes:
  postgres_data:
