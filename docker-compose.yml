# docker-compose.yml
version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ap-automation-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://apuser:appassword@pgsql:5432/apautomation
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-changeme-in-production-use-strong-secret}
      - JWT_ALGORITHM=HS256
      - THRESHOLD_HIGH=90
      - THRESHOLD_MID=70
      - THRESHOLD_LOW=50
      - TOLERANCE_PRICE=5.0
      - TOLERANCE_QTY=10.0
      - LOG_LEVEL=INFO
    depends_on:
      pgsql:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - ap-network

  pgsql:
    image: postgres:15-alpine
    container_name: ap-automation-pgsql
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=pgpassword
      - POSTGRES_DB=apautomation
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ap-network

  pgbo:
    image: edoburu/pgbouncer:latest
    container_name: ap-automation-pgbouncer
    environment:
      - DATABASE_URL=postgresql://postgres:pgpassword@pgsql:5432/apautomation
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=100
      - DEFAULT_POOL_SIZE=20
      - MIN_POOL_SIZE=5
      - RESERVE_POOL_SIZE=5
      - RESERVE_POOL_TIMEOUT=5
    ports:
      - "6432:5432"
    depends_on:
      pgsql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgbouncer", "-h", "localhost", "-p", "5432", "-u", "pgbouncer", "-d", "pgbouncer"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ap-network

  tests:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ap-automation-tests
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:pgpassword@pgsql:5432/apautomation_test
      - JWT_SECRET_KEY=test-secret-key-for-testing-only
      - JWT_ALGORITHM=HS256
      - THRESHOLD_HIGH=90
      - THRESHOLD_MID=70
      - THRESHOLD_LOW=50
      - TOLERANCE_PRICE=5.0
      - TOLERANCE_QTY=10.0
    depends_on:
      pgsql:
        condition: service_healthy
    profiles:
      - test
    command: pytest tests/ -v --tb=short
    networks:
      - ap-network

volumes:
  pgdata:
    driver: local

networks:
  ap-network:
    driver: bridge
