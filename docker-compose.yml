# docker-compose.yml
version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://finaro:finaro_secret@db:5432/finaro
      - DATABASE_URL_SYNC=postgresql://finaro:finaro_secret@db:5432/finaro
      - SECRET_KEY=${SECRET_KEY:-supersecretkeychangeinproduction123456}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    command: uvicorn src.app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=finaro
      - POSTGRES_PASSWORD=finaro_secret
      - POSTGRES_DB=finaro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finaro -d finaro"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql+asyncpg://finaro:finaro_secret@db:5432/finaro
      - DATABASE_URL_SYNC=postgresql://finaro:finaro_secret@db:5432/finaro
    depends_on:
      db:
        condition: service_healthy
    command: alembic upgrade head
    restart: "no"

volumes:
  postgres_data:
