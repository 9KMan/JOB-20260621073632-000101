# docker-compose.yml
version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finaro-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://finaro:finaro123@db:5432/finaro_db
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - finaro-network

  db:
    image: postgres:16-alpine
    container_name: finaro-db
    environment:
      - POSTGRES_USER=finaro
      - POSTGRES_PASSWORD=finaro123
      - POSTGRES_DB=finaro_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finaro -d finaro_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finaro-network

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finaro-migrate
    environment:
      - DATABASE_URL=postgresql://finaro:finaro123@db:5432/finaro_db
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    depends_on:
      db:
        condition: service_healthy
    command: alembic upgrade head
    networks:
      - finaro-network

volumes:
  postgres_data:

networks:
  finaro-network:
    driver: bridge
