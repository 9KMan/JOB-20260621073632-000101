version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finaro-ap-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://finaro:secret@postgres:5432/finaro_ap
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
      - JWT_ALGORITHM=HS256
      - THRESHOLD_HIGH=90
      - THRESHOLD_MID=70
      - THRESHOLD_LOW=50
      - TOLERANCE_PRICE=5.0
      - TOLERANCE_QTY=10.0
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    volumes:
      - ./src:/app/src
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn src.app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    container_name: finaro-ap-postgres
    environment:
      - POSTGRES_USER=finaro
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=finaro_ap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finaro -d finaro_ap"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgbo:
    image: edoburu/pgbouncer:latest
    container_name: finaro-ap-pgbouncer
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=finaro_ap
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=100
      - DEFAULT_POOL_SIZE=20
      - RESERVE_POOL_SIZE=5
      - USER=finaro
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy

  # Optional: Development tools
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: finaro-ap-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@finaro.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    profiles:
      - devtools
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
