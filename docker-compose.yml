# docker-compose.yml
version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: ap_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apsecret}
      POSTGRES_DB: ${POSTGRES_DB:-apautomation}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apuser} -d ${POSTGRES_DB:-apautomation}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ap_network

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: ap_pgbouncer
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-apuser}:${POSTGRES_PASSWORD:-apsecret}@postgres:5432/${POSTGRES_DB:-apautomation}"
      POOL_MODE: "transaction"
      MAX_CLIENT_CONN: "100"
      DEFAULT_POOL_SIZE: "10"
      RESERVE_POOL_SIZE: "5"
    ports:
      - "${PGBOUNCER_PORT:-6432}:5432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgbouncer -h localhost -p 5432 -U ${POSTGRES_USER:-apuser} -d ${POSTGRES_DB:-apautomation} -c 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ap_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ap_api
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-apuser}:${POSTGRES_PASSWORD:-apsecret}@pgbouncer:5432/${POSTGRES_DB:-apautomation}"
      DATABASE_POOL_SIZE: "10"
      DATABASE_MAX_OVERFLOW: "20"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:-changeme-in-production-use-secure-random-key}"
      JWT_ALGORITHM: "HS256"
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      THRESHOLD_HIGH: "${THRESHOLD_HIGH:-95}"
      THRESHOLD_MID: "${THRESHOLD_MID:-70}"
      THRESHOLD_LOW: "${THRESHOLD_LOW:-50}"
      TOLERANCE_PRICE: "${TOLERANCE_PRICE:-5}"
      TOLERANCE_QTY: "${TOLERANCE_QTY:-10}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ap_network
    volumes:
      - ./:/app
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

volumes:
  postgres_data:
    driver: local

networks:
  ap_network:
    driver: bridge
